<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Panda Kong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1b2a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    width: 100vw;
    height: 100vh;
    height: 100dvh; /* dynamic viewport: excludes browser chrome on Android */
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #game-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: top center;
  }
  h1 { color: #ff6b35; font-size: 26px; letter-spacing: 6px; margin-bottom: 5px; text-shadow: 0 0 10px #ff6b3588; }
  canvas { border: 3px solid #ff6b35; box-shadow: 0 0 30px #ff6b3544; display: block; }
  #hud { display:flex; justify-content:space-between; width:800px; padding:5px 4px; color:#eee; font-size:13px; }
  #controls { color:#667; font-size:11px; margin-top:3px; width:800px; text-align:center; }
  /* ── Touch overlay (fixed in viewport, independent of canvas scale) ── */
  #joy-zone { display:none; position:fixed; bottom:0; left:0; width:220px; height:220px;
              touch-action:none; z-index:10; }
  #joy-base { display:none; position:absolute; width:120px; height:120px; border-radius:50%;
              background:rgba(255,107,53,0.12); border:2px solid rgba(255,107,53,0.45);
              transform:translate(-50%,-50%); pointer-events:none; }
  #joy-knob { position:absolute; width:56px; height:56px; border-radius:50%;
              background:rgba(255,107,53,0.75); top:60px; left:60px;
              transform:translate(-50%,-50%); transition:none; }
  #act-zone { display:none; position:fixed; bottom:18px; right:18px; flex-direction:column;
              align-items:flex-end; gap:12px; z-index:10; touch-action:none; }
  .tbtn { background:rgba(255,107,53,0.18); border:2px solid rgba(255,107,53,0.6);
          border-radius:50%; color:#ff6b35; font-weight:bold; touch-action:none;
          -webkit-user-select:none; display:flex; align-items:center; justify-content:center; }
  .tbtn:active, .tbtn.pressed { background:rgba(255,107,53,0.5); }
  #btn-jump { width:96px; height:96px; font-size:15px; letter-spacing:1px; border-radius:50%; }
  #btn-poo  { width:68px; height:68px; font-size:28px; border-radius:50%; }
  /* ── Portrait warning overlay ── */
  #rotate-msg {
    display: none;
    position: fixed; inset: 0; z-index: 999;
    background: #0d1b2a;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #ff6b35;
    font-family: 'Courier New', monospace;
    text-align: center;
    gap: 20px;
  }
  #rotate-msg .icon { font-size: 72px; animation: spin 2s linear infinite; }
  #rotate-msg p { font-size: 18px; letter-spacing: 2px; line-height: 1.6; }
  @keyframes spin {
    0%   { transform: rotate(0deg); }
    25%  { transform: rotate(-90deg); }
    50%  { transform: rotate(-90deg); }
    75%  { transform: rotate(0deg); }
    100% { transform: rotate(0deg); }
  }
  @media (orientation: portrait) and (max-width: 900px) {
    #rotate-msg { display: flex; }
    #game-wrap, #joy-zone, #act-zone { visibility: hidden; }
  }
</style>
</head>
<body>
<div id="game-wrap">
  <h1>🐼 PANDA KONG 🏴‍☠️</h1>
  <canvas id="c" width="800" height="690"></canvas>
  <div id="hud">
    <span id="scoreEl">SCORE: 0</span>
    <span id="rankEl">BAMBOO BABY</span>
    <span id="hiEl">HI: 0</span>
    <span id="levelEl">LV 1</span>
    <span id="livesEl">❤ ❤ ❤</span>
  </div>
  <div id="controls">← → Move &nbsp;|&nbsp; ↑ ↓ Climb ladder &nbsp;|&nbsp; SPACE Jump &nbsp;|&nbsp; E Drop 💩 (destroys one log!) &nbsp;|&nbsp; Ladders zigzag!</div>
</div>
<!-- Joystick zone (bottom-left, fixed to viewport, touch only) -->
<div id="joy-zone">
  <div id="joy-base"><div id="joy-knob"></div></div>
</div>
<!-- Action buttons (bottom-right, fixed to viewport, touch only) -->
<div id="act-zone">
  <button class="tbtn" id="btn-poo">💩</button>
  <button class="tbtn" id="btn-jump">JUMP</button>
</div>
<!-- Name entry overlay for touch devices -->
<div id="name-overlay" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.85);
     flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:'Courier New',monospace;">
  <div style="color:#ffd700;font-size:22px;font-weight:bold;letter-spacing:3px;">ENTER YOUR INITIALS</div>
  <input id="name-input" type="text" maxlength="3"
    autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
    style="font:bold 52px 'Courier New',monospace;width:190px;text-align:center;letter-spacing:20px;
           background:#111830;color:#ffd700;border:3px solid #ffd700;padding:10px 8px;
           border-radius:6px;outline:none;text-transform:uppercase;">
  <button id="name-ok" style="font:bold 18px 'Courier New',monospace;background:#ff6b35;color:#fff;
          border:none;padding:12px 40px;border-radius:8px;letter-spacing:2px;cursor:pointer;">OK</button>
</div>
<!-- Portrait rotation prompt -->
<div id="rotate-msg">
  <div class="icon">📱</div>
  <p>ROTATE YOUR DEVICE<br>FOR THE BEST EXPERIENCE</p>
</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 800, H = 690;
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

// ─── CONSTANTS ─────────────────────────────────────────────────────────────
const GRAV  = 0.45;
const JUMP  = -8;    // max rise ≈ 71px; min platform gap ≈ 82px → cannot skip levels
const SPD   = 3.4;
const CSPD  = 2.4;
const PLAT_H = 12;
const COYOTE_FRAMES = 6;

// ─── PLATFORMS [x, w, y_left, y_right] ────────────────────────────────────
// 6 platforms (5 level-gaps) with alternating tilt ±15px over 780px.
// Tilt ±15px ensures min gap between adjacent platforms ≥ 82px everywhere.
// (JUMP max rise ≈ 71px → player physically cannot skip a level.)
const PLATS = [
  [10, 780, 673, 658],  // Ground  (platIdx 0): left  tilt → logs roll left
  [10, 780, 531, 546],  // Level 2 (platIdx 1): right tilt → logs roll right
  [10, 780, 449, 434],  // Level 3 (platIdx 2): left  tilt → logs roll left
  [10, 780, 307, 322],  // Level 4 (platIdx 3): right tilt → logs roll right
  [10, 780, 225, 210],  // Level 5 (platIdx 4): left  tilt → logs roll left
  [10, 780,  95, 110],  // Top     (platIdx 5): right tilt → logs roll right ✓ (pirate on left)
];

// ─── LADDERS — generated randomly each game/level ─────────────────────────
// Each gap has ladders on one side only (zigzag), count varies 1-3.
// GAP_DEFS: [lowerPlatIdx, upperPlatIdx, xMin, xMax]
// Zigzag: Ground→L2 RIGHT, L2→L3 LEFT, L3→L4 RIGHT, L4→L5 LEFT, L5→Top RIGHT
const GAP_DEFS = [
  [0, 1, 390, 755],  // Ground→L2: RIGHT
  [1, 2,  30, 370],  // L2→L3:    LEFT
  [2, 3, 260, 720],  // L3→L4:    RIGHT-CENTER
  [3, 4,  30, 400],  // L4→L5:    LEFT
  [4, 5, 430, 755],  // L5→Top:   RIGHT (baby panda is far right)
];

function pickXPositions(n, xMin, xMax, minSpacing) {
  const xs = [];
  for (let attempt = 0; attempt < 300 && xs.length < n; attempt++) {
    const x = xMin + Math.floor(Math.random() * (xMax - xMin));
    if (xs.every(ex => Math.abs(ex - x) >= minSpacing)) xs.push(x);
  }
  return xs.sort((a, b) => a - b);
}

function generateLadders() {
  const ladds = [];
  for (const [lo, hi, xMin, xMax] of GAP_DEFS) {
    const count = Math.random() < 0.35 ? 1 : Math.random() < 0.7 ? 2 : 3;
    for (const cx of pickXPositions(count, xMin, xMax, 110)) {
      const yTop = plY(PLATS[hi], cx);
      const h    = plY(PLATS[lo], cx) - yTop;
      ladds.push([cx, Math.round(yTop), Math.round(h)]);
    }
  }
  return ladds;
}

let LADDS = [];

function generateFires() {
  const cnt=difficulty>=6?3:difficulty>=3?2:1;
  const pis=[1,2,3,4]; const used=new Set(); const fires=[];
  for (let i=0;i<cnt;i++) {
    const avail=pis.filter(p=>!used.has(p));
    if (!avail.length) break;
    const pi=avail[Math.floor(Math.random()*avail.length)];
    used.add(pi);
    const pl=PLATS[pi];
    let x, att=0;
    do { x=pl[0]+80+Math.random()*(pl[1]-160); att++; }
    while (att<60 && LADDS.some(([lx])=>Math.abs(lx-x)<70));
    fires.push({pi, x, y:plY(pl,x), w:Math.random()*Math.PI*2});
  }
  return fires;
}

function generateRums() {
  const cnt=difficulty>=4?2:1;
  const pis=[1,2,3,4]; const used=new Set(); const rums=[];
  for (let i=0;i<cnt;i++) {
    const avail=pis.filter(p=>!used.has(p));
    if (!avail.length) break;
    const pi=avail[Math.floor(Math.random()*avail.length)];
    used.add(pi);
    const pl=PLATS[pi];
    let x, att=0;
    do { x=pl[0]+80+Math.random()*(pl[1]-160); att++; }
    while (att<60 && (LADDS.some(([lx])=>Math.abs(lx-x)<80)||FIRES.some(f=>f.pi===pi&&Math.abs(f.x-x)<80)));
    rums.push({pi, x, y:plY(pl,x), exploding:false, explTimer:0});
  }
  return rums;
}

// ─── DIFFICULTY ─────────────────────────────────────────────────────────────
let difficulty = 1, gameLevel = 1;
function logSpawnInterval() { return Math.max(28, 130 - difficulty * 13); }
function logBaseSpeed()     { return Math.min(8.0, 1.5 + difficulty * 0.45); }
function maxLogsOnScreen()  { return Math.min(20, 6 + Math.floor(difficulty * 1.2)); }

const RANKS = ['BAMBOO BABY','LOG DODGER','PANDA PRO','STORM CLIMBER','TYPHOON MASTER','KONG LEGEND'];
function diffRank() { return RANKS[Math.min(difficulty-1, RANKS.length-1)]; }

// ─── HI SCORE (Firebase Realtime Database) ───────────────────────────────────
const FB = 'https://panda-rescue-40ad7-default-rtdb.europe-west1.firebasedatabase.app/scores';
let scores = [];
let hiScore = 0;
let nameLetters, namePos, nameBlink, justAdded;

async function loadScores() {
  try {
    const r = await fetch(FB + '.json?orderBy="score"&limitToLast=10');
    const data = await r.json();
    scores = data ? Object.values(data).sort((a,b) => b.score - a.score) : [];
    hiScore = scores.length ? scores[0].score : 0;
    updateHUD();
  } catch(e) { /* offline — scores stay empty */ }
}
loadScores();

// ─── WEB AUDIO ───────────────────────────────────────────────────────────────
let audioCtx = null;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function _beep(freq, type, vol, start, dur, freqEnd) {
  const a = ac(), osc = a.createOscillator(), gain = a.createGain();
  osc.connect(gain); gain.connect(a.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, a.currentTime + start);
  if (freqEnd !== undefined)
    osc.frequency.linearRampToValueAtTime(freqEnd, a.currentTime + start + dur);
  gain.gain.setValueAtTime(vol, a.currentTime + start);
  gain.gain.exponentialRampToValueAtTime(0.001, a.currentTime + start + dur);
  osc.start(a.currentTime + start);
  osc.stop(a.currentTime + start + dur + 0.01);
}
function sfxJump()      { _beep(220,'square',0.18,0,0.05,440); _beep(440,'square',0.10,0.04,0.08,660); }
function sfxDeath()     { _beep(500,'sawtooth',0.20,0,0.18,80); _beep(300,'sawtooth',0.15,0.18,0.15,60); _beep(80,'sine',0.3,0.5,0.12); }
function sfxBonus()     { [523,659,784,1047].forEach((f,i) => _beep(f,'triangle',0.18,i*0.07,0.09)); }
function sfxWin()       { [523,659,784,659,784,1047,1175].forEach((f,i) => _beep(f,'triangle',0.22,i*0.11,0.13)); }
function sfxLogPass()   { _beep(120,'sine',0.07,0,0.04); }
function sfxClimbTick() { _beep(180,'square',0.04,0,0.03); }
function sfxBlip()      { _beep(600,'square',0.10,0,0.04); }
function sfxNameDone()  { [523,659,784,1047].forEach((f,i)=>_beep(f,'square',0.14,i*0.06,0.07)); }
function sfxExplosion() { _beep(80,'sawtooth',0.30,0,0.18,35); _beep(220,'square',0.20,0.05,0.14,55); _beep(440,'triangle',0.12,0.12,0.10,80); }

// ─── MUSIC LOOP ──────────────────────────────────────────────────────────────
const MSEQ_BASS=[131,0,131,0,165,0,131,0,131,0,131,0,175,0,131,0];
const MSEQ_MELO=[659,523,0,659,784,0,659,523,698,587,0,698,784,0,698,587];
function scheduleMusicStep() {
  if (!musicPlaying) return;
  const bpm=148+difficulty*6, dur=60/bpm/2;
  const si=musicStep%MSEQ_BASS.length;
  if (MSEQ_BASS[si]>0) _beep(MSEQ_BASS[si],'triangle',0.09,0,dur*0.85);
  if (MSEQ_MELO[si]>0) _beep(MSEQ_MELO[si],'square',0.05,0,dur*0.75);
  musicStep++;
  musicTimeoutId=setTimeout(scheduleMusicStep, dur*1000);
}
function startMusic() { if (musicPlaying) return; musicPlaying=true; musicStep=0; scheduleMusicStep(); }
function stopMusic()  { musicPlaying=false; if (musicTimeoutId) { clearTimeout(musicTimeoutId); musicTimeoutId=null; } }

// ─── SCORE HELPERS ──────────────────────────────────────────────────────────
function isTopTen(s) { return s > 0 && (scores.length < 10 || s > scores[scores.length-1].score); }
function submitScore(name) {
  justAdded = {name, score};
  scores.push(justAdded);
  scores.sort((a,b) => b.score - a.score);
  if (scores.length > 10) scores.length = 10;
  if (!scores.includes(justAdded)) justAdded = null;
  hiScore = scores[0].score; updateHUD();
  // Push to Firebase (fire-and-forget; re-fetch to sync global board)
  fetch(FB + '.json', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, score})
  }).then(() => loadScores()).catch(() => {});
}
function startNameEntry() {
  nameLetters=['A','A','A']; namePos=0; nameBlink=0; state='namentry';
  if (isTouch) {
    const ov = document.getElementById('name-overlay');
    const inp = document.getElementById('name-input');
    inp.value = '';
    ov.style.display = 'flex';
    // Small delay so the overlay is painted before focus — iOS needs this
    setTimeout(() => inp.focus(), 50);
  }
}
function endNameEntry(name) {
  if (isTouch) {
    const ov = document.getElementById('name-overlay');
    document.getElementById('name-input').blur();
    ov.style.display = 'none';
  }
  submitScore(name); sfxNameDone(); state='gameover';
}

// ─── STATE ─────────────────────────────────────────────────────────────────
let P, logs, score, lives, state, frame, logTimer, pirateFrame, deathTimer;
let bonusTimer=0, bonusAmt=0, bonusX=0, bonusY=0, bonusLabel='';
let coyoteTimer=0, shakeTimer=0, shakeX=0, shakeY=0;
let winSfxPlayed=false;
let combo=0, wasAirborne=false;
let nearMissTimer=0, nearMissPts=0, nearMissX=0, nearMissY=0;
let FIRES=[], RUMS=[];
let poo=null, pooTimer=0;
let musicPlaying=false, musicStep=0, musicTimeoutId=null;

function reset() {
  P = { x:60, y:625, vx:0, vy:0, w:20, h:30,
        onGround:false, onLadder:false, climbing:false,
        groundPl:null, facing:1, runFrame:0, runTimer:0 };
  logs = [];
  logTimer = 1; // spawn first log immediately
  pirateFrame=0; frame=0; deathTimer=0;
  coyoteTimer=0; shakeTimer=0; shakeX=0; shakeY=0;
  winSfxPlayed=false;
  combo=0; wasAirborne=false; nearMissTimer=0;
  FIRES=generateFires();
  RUMS=generateRums();
  poo=null; pooTimer=0;
}

function init(keepScore=false) {
  if (!keepScore) { score=0; lives=3; difficulty=1; gameLevel=1; }
  LADDS = generateLadders();
  reset(); state='title'; updateHUD();
}

// ─── INPUT ─────────────────────────────────────────────────────────────────
const K={}, KP={};
let typedKey=null;
addEventListener('keydown', e => {
  if (!K[e.code]) KP[e.code]=true;
  K[e.code]=true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (state==='namentry' && e.key.length===1 && /[a-zA-Z]/.test(e.key)) typedKey=e.key.toUpperCase();
});
addEventListener('keyup', e => { K[e.code]=false; });
function clearKP() { for (let k in KP) delete KP[k]; typedKey=null; }

// ─── SCALE GAME TO FIT VIEWPORT ──────────────────────────────────────────────
// On touch: hide the title to maximise canvas space
if (isTouch) {
  const h1 = document.querySelector('h1');
  if (h1) h1.style.display = 'none';
}

// Known natural game dimensions (canvas 800×690 + HUD ~30px)
const GAME_W = 800;
const GAME_H_TOUCH   = 722; // no h1 on touch: canvas 690 + hud 32
const GAME_H_DESKTOP = 762; // h1 36 + margin 5 + canvas 690 + hud 31

function scaleGame() {
  // Don't rescale while the name entry overlay is open (keyboard would be up)
  const _ov = document.getElementById('name-overlay');
  if (_ov && _ov.style.display === 'flex') return;
  const GAME_H = isTouch ? GAME_H_TOUCH : GAME_H_DESKTOP;
  // visualViewport gives the true visible area on Android (excludes URL bar,
  // keyboard, etc.). Falls back to window dimensions on desktop.
  const vw = (window.visualViewport || window).width  || window.innerWidth;
  const vh = (window.visualViewport || window).height || window.innerHeight;
  const s = Math.min(vw / GAME_W, vh / GAME_H);
  const wrap = document.getElementById('game-wrap');
  wrap.style.transform = `scale(${s})`;
  wrap.style.transformOrigin = 'top center';
  // Collapse the blank space below the scaled-down content
  wrap.style.marginBottom = `-${GAME_H * (1 - s)}px`;

  // Scale the fixed touch buttons to stay proportional to the game
  if (isTouch) {
    const bs = Math.max(0.55, s); // don't shrink buttons below 55% — still tappable
    document.getElementById('btn-jump').style.transform = `scale(${bs})`;
    document.getElementById('btn-poo').style.transform  = `scale(${bs})`;
    document.getElementById('joy-zone').style.transform = `scale(${bs})`;
    document.getElementById('joy-zone').style.transformOrigin = 'bottom left';
  }
}

// Run once after first paint so layout is settled, then on every resize
requestAnimationFrame(scaleGame);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', scaleGame);
} else {
  window.addEventListener('resize', scaleGame);
}

if (isTouch) {
  document.getElementById('controls').style.display = 'none';

  // Show fixed-position touch controls
  const joyZone = document.getElementById('joy-zone');
  const joyBase = document.getElementById('joy-base');
  const joyKnob = document.getElementById('joy-knob');
  const actZone = document.getElementById('act-zone');
  joyZone.style.display = 'block';
  actZone.style.display = 'flex';

  // ── Joystick (dynamic base – appears at first touch) ──────────────────────
  const JOY_MAX  = 50;  // max knob travel from base centre (px)
  const JOY_DEAD = 10;  // dead zone radius before input registers (px)
  let joyId = null, joyBX = 0, joyBY = 0;

  function joyDir(dx, dy) {
    const dist = Math.sqrt(dx*dx + dy*dy);
    const nL = dist > JOY_DEAD && dx < -JOY_DEAD;
    const nR = dist > JOY_DEAD && dx >  JOY_DEAD;
    const nU = dist > JOY_DEAD && dy < -JOY_DEAD;
    const nD = dist > JOY_DEAD && dy >  JOY_DEAD;
    // Edge-trigger KP so namentry letter cycling works with the joystick
    if (nL && !K['ArrowLeft'])  KP['ArrowLeft']  = true;
    if (nR && !K['ArrowRight']) KP['ArrowRight'] = true;
    if (nU && !K['ArrowUp'])    KP['ArrowUp']    = true;
    if (nD && !K['ArrowDown'])  KP['ArrowDown']  = true;
    K['ArrowLeft'] = nL; K['ArrowRight'] = nR;
    K['ArrowUp']   = nU; K['ArrowDown']  = nD;
  }
  function joyReset() {
    joyId = null;
    joyBase.style.display = 'none';
    K['ArrowLeft'] = K['ArrowRight'] = K['ArrowUp'] = K['ArrowDown'] = false;
  }

  joyZone.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    joyId = t.identifier;
    // Place base at touch point, relative to joy-zone (which is at bottom:0,left:0)
    const rect = joyZone.getBoundingClientRect();
    joyBX = t.clientX - rect.left;
    joyBY = t.clientY - rect.top;
    joyBase.style.display = 'block';
    joyBase.style.left = joyBX + 'px';
    joyBase.style.top  = joyBY + 'px';
    joyKnob.style.left = '60px';
    joyKnob.style.top  = '60px';
    // Tap to advance screens
    if (state !== 'playing') KP['Space'] = true;
  }, {passive:false});

  joyZone.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier !== joyId) continue;
      const rect = joyZone.getBoundingClientRect();
      let dx = (t.clientX - rect.left) - joyBX;
      let dy = (t.clientY - rect.top)  - joyBY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > JOY_MAX) { dx = dx/dist*JOY_MAX; dy = dy/dist*JOY_MAX; }
      // joy-base is 120px; knob centre at 50%/50% = 60px from edge
      joyKnob.style.left = (60 + dx) + 'px';
      joyKnob.style.top  = (60 + dy) + 'px';
      joyDir(dx, dy);
    }
  }, {passive:false});

  joyZone.addEventListener('touchend',    e => { for (const t of e.changedTouches) if (t.identifier===joyId) joyReset(); }, {passive:false});
  joyZone.addEventListener('touchcancel', e => { for (const t of e.changedTouches) if (t.identifier===joyId) joyReset(); }, {passive:false});

  // ── Action buttons ─────────────────────────────────────────────────────────
  function bindTap(id, code) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart',  e => { e.preventDefault(); KP[code]=true; K[code]=true; }, {passive:false});
    el.addEventListener('touchend',    e => { e.preventDefault(); K[code]=false; }, {passive:false});
    el.addEventListener('touchcancel', () => { K[code]=false; });
  }
  bindTap('btn-jump', 'Space');
  bindTap('btn-poo',  'KeyE');

  // Tap canvas (outside joy-zone) to advance screens
  C.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state !== 'playing') KP['Space'] = true;
  }, {passive:false});

  // Name overlay: input + OK button
  const nameInp = document.getElementById('name-input');
  function submitOverlayName() {
    if (state !== 'namentry') return;
    const val = nameInp.value.toUpperCase().replace(/[^A-Z]/g, '').padEnd(3, 'A').slice(0, 3);
    endNameEntry(val);
  }
  nameInp.addEventListener('input', () => {
    if (state !== 'namentry') return;
    const val = nameInp.value.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 3);
    nameInp.value = val;
    for (let i = 0; i < 3; i++) nameLetters[i] = val[i] || 'A';
    namePos = Math.min(val.length, 2);
    if (val.length >= 3) endNameEntry(val);
  });
  nameInp.addEventListener('keydown', e => {
    if (e.key === 'Enter') submitOverlayName();
  });
  document.getElementById('name-ok').addEventListener('touchstart', e => {
    e.preventDefault();
    submitOverlayName();
  }, {passive:false});
}

// ─── HUD ───────────────────────────────────────────────────────────────────
function updateHUD() {

  document.getElementById('levelEl').textContent = 'LV '+gameLevel;
  document.getElementById('rankEl').textContent  = diffRank();

  document.getElementById('livesEl').textContent = h.trim();
}

// ─── PLATFORM HELPERS ──────────────────────────────────────────────────────
function plY(pl, x) {
  const t = Math.max(0, Math.min(1, (x-pl[0])/pl[1]));
  return pl[2] + (pl[3]-pl[2]) * t;
}
function getLogDir(pl) { return pl[3] >= pl[2] ? 1 : -1; }
function overlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function getLadder() {
  const cx=P.x+P.w/2, cy=P.y+P.h/2;
  for (let l of LADDS) {
    const [lx,ly,lh]=l;
    if (Math.abs(cx-lx)<18 && cy>ly-10 && cy<ly+lh+10) return l;
  }
  return null;
}

// ─── SLOPE COLLISION ───────────────────────────────────────────────────────
function checkPlatformSnap() {
  const cx=P.x+P.w/2, feet=P.y+P.h;
  P.onGround=false; P.groundPl=null;
  for (let pl of PLATS) {
    if (cx<pl[0]-2 || cx>pl[0]+pl[1]+2) continue;
    const surfY=plY(pl,cx);
    if (feet>=surfY-4 && feet<=surfY+22 && P.vy>=-0.5) {
      P.y=surfY-P.h; P.vy=0; P.onGround=true; P.groundPl=pl; break;
    }
  }
}

// ─── PLAYER UPDATE ─────────────────────────────────────────────────────────
function updatePlayer() {
  const ladder=getLadder(), wasGround=P.onGround;
  P.onLadder=!!ladder;

  if (P.onLadder && (K['ArrowUp']||K['ArrowDown'])) {
    P.climbing=true; P.vy=0; P.vx=0;
    if (K['ArrowUp'])   P.vy=-CSPD;
    if (K['ArrowDown']) P.vy= CSPD;
    P.x=ladder[0]-P.w/2;
    if (frame%14===0) sfxClimbTick();
  } else if (P.climbing && !P.onLadder) {
    P.climbing=false; P.vy=0;
  } else if (P.climbing && P.onGround) {
    P.climbing=false;
  }

  if (!P.climbing) {
    P.vx=0;
    if (K['ArrowLeft'])  { P.vx=-SPD; P.facing=-1; }
    if (K['ArrowRight']) { P.vx= SPD; P.facing= 1; }

    if (wasGround && !P.onGround && P.vy>=0) coyoteTimer=COYOTE_FRAMES;
    if (P.onGround) coyoteTimer=0;
    if (coyoteTimer>0) coyoteTimer--;

    if (KP['Space'] && (P.onGround||coyoteTimer>0)) {
      P.vy=JUMP; P.onGround=false; coyoteTimer=0; sfxJump();
    }
    P.vy+=GRAV;
  }

  P.x+=P.vx; P.x=Math.max(0,Math.min(W-P.w,P.x)); P.y+=P.vy;
  checkPlatformSnap();
  if (P.onGround && P.groundPl) P.y=plY(P.groundPl,P.x+P.w/2)-P.h;

  if (P.y>H+40) { die(); return; }
  if (P.y<0) { P.y=0; if (P.vy<0) P.vy=0; }

  if (P.onGround && P.vx!==0) {
    P.runTimer++;
    if (P.runTimer>8) { P.runFrame=(P.runFrame+1)%4; P.runTimer=0; }
  } else if (!P.onGround && !P.climbing) {
    P.runFrame=1;
  }

  // Win check — baby on far-right of Top
  const TOP=PLATS[5], babyX=TOP[0]+TOP[1]-80, babyY=plY(TOP,babyX)-44;
  if (overlap(P.x,P.y,P.w,P.h, babyX,babyY,30,40)) {
    score+=2000+difficulty*500;
    if (score>hiScore) { hiScore=score; }
    updateHUD(); state='win'; stopMusic();
    if (!winSfxPlayed) { sfxWin(); winSfxPlayed=true; }
  }
}

function die() {
  stopMusic(); lives--; shakeTimer=22; sfxDeath();
  if (lives <= 0) {
    if (score > hiScore) hiScore = score;
    updateHUD();
    if (isTopTen(score)) startNameEntry();
    else { justAdded=null; state='gameover'; }
  } else {
    updateHUD(); state='dead'; deathTimer=120;
  }
}

// ─── LOG UPDATE ────────────────────────────────────────────────────────────
function updateLogs() {
  logTimer--;
  if (logTimer<=0 && logs.length<maxLogsOnScreen()) {
    const TOP=PLATS[5], spawnX=TOP[0]+70, spawnY=plY(TOP,spawnX)-10;
    const spd=logBaseSpeed()+Math.random()*0.8;
    const type=Math.random()<0.77?'normal':'fast';
    const speed=(type==='fast'?1.5:1.0)*spd;
    // Top has right tilt → getLogDir returns +1 → logs naturally roll RIGHT from pirate (left) to right.
    logs.push({x:spawnX,y:spawnY,vx:speed,vy:0,platIdx:5,r:9,rolling:true,type,rot:0});
    logTimer=logSpawnInterval()+Math.random()*40;
    pirateFrame=30;
  }
  if (pirateFrame>0) pirateFrame--;

  for (let i=logs.length-1;i>=0;i--) {
    const lg=logs[i];
    if (!lg.rolling) lg.vy+=GRAV*0.85;
    lg.x+=lg.vx; lg.y+=lg.vy;
    if (lg.rolling) lg.rot+=lg.vx/lg.r;

    // Land on platform below
    if (!lg.rolling||lg.vy>0) {
      for (let pi=0;pi<PLATS.length;pi++) {
        if (pi===lg.platIdx) continue;
        const pl=PLATS[pi];
        if (lg.x<pl[0]||lg.x>pl[0]+pl[1]) continue;
        const surfY=plY(pl,lg.x);
        if (lg.y+lg.r>=surfY-4 && lg.y+lg.r<=surfY+60 && lg.vy>=0) {
          lg.y=surfY-lg.r; lg.vy=0; lg.platIdx=pi;
          const tm=lg.type==='fast'?1.5:1.0;
          lg.vx=getLogDir(pl)*tm*(logBaseSpeed()+(5-pi)*0.20);
          lg.rolling=true; break;
        }
      }
    }

    // Snap to slope, detect edge exit
    if (lg.rolling && lg.platIdx>=0) {
      const pl=PLATS[lg.platIdx];
      lg.y=plY(pl,lg.x)-lg.r;
      const edgeL=pl[0], edgeR=pl[0]+pl[1], midX=(edgeL+edgeR)/2;
      if (lg.x-lg.r<edgeL||lg.x+lg.r>edgeR) {
        lg.rolling=false; lg.vy=2;
        lg.vx=(lg.x>midX)?-1.5:1.5; // inward drift for visible cascade
      }
    }

    if (lg.y>H+80||lg.x<-80||lg.x>W+80) {
      logs.splice(i,1);
      score+=10+difficulty*5; sfxLogPass(); updateHUD();
    }
  }
}

// ─── JUMP-OVER BONUS (with combo multiplier) ────────────────────────────────
function checkJumpBonus() {
  const airborne=!P.onGround&&!P.climbing;
  if (!airborne && wasAirborne) combo=0; // reset combo on landing
  wasAirborne=airborne;
  if (!airborne) return;
  for (let lg of logs) {
    if (!lg._jumped && Math.abs((P.x+P.w/2)-lg.x)<lg.r+14 && P.y+P.h>lg.y-lg.r) {
      lg._jumped=true; combo++;
      const pts=(100+difficulty*50)*Math.max(1,combo); score+=pts;
      bonusLabel=combo>1?`+${pts} \xd7${combo}`:`+${pts}`;
      bonusAmt=pts; bonusX=P.x+P.w/2; bonusY=P.y-10; bonusTimer=60;
      sfxBonus(); updateHUD();
    }
  }
}

// ─── NEAR-MISS BONUS ────────────────────────────────────────────────────────
function checkNearMiss() {
  if (P.climbing) return;
  for (let lg of logs) {
    if (lg._nearMissed || !lg.rolling) continue;
    const dx=Math.abs((P.x+P.w/2)-lg.x);
    const dy=Math.abs((P.y+P.h/2)-lg.y);
    if (dx<lg.r+30 && dy<50 && P.onGround &&
        !overlap(P.x+2,P.y+3,P.w-4,P.h-4,lg.x-lg.r,lg.y-lg.r,lg.r*2,lg.r*2)) {
      lg._nearMissed=true;
      const pts=50+difficulty*20; score+=pts;
      nearMissPts=pts; nearMissX=P.x+P.w/2; nearMissY=P.y-30; nearMissTimer=50;
      sfxBonus(); updateHUD();
    }
  }
}

// ─── POO MECHANIC ────────────────────────────────────────────────────────────
function updatePoo() {
  if (pooTimer>0) pooTimer--;
  if (KP['KeyE'] && !poo && pooTimer<=0 && P.onGround && P.groundPl) {
    const pi=PLATS.indexOf(P.groundPl), px=P.x+P.w/2;
    poo={x:px, y:plY(P.groundPl,px), platIdx:pi, life:300};
    pooTimer=90;
  }
  if (!poo) return;
  poo.life--;
  if (poo.life<=0) { poo=null; return; }
  // Catch rolling logs on same platform
  for (let i=logs.length-1;i>=0;i--) {
    const lg=logs[i];
    if (!lg.rolling||lg.platIdx!==poo.platIdx) continue;
    if (Math.abs(lg.x-poo.x)<lg.r+14) {
      const pts=75+difficulty*25; score+=pts;
      bonusLabel='SPLAT! +'+pts; bonusAmt=pts;
      bonusX=poo.x; bonusY=poo.y-20; bonusTimer=50;
      sfxBonus(); updateHUD(); logs.splice(i,1);
      poo=null; return;
    }
  }
}

}

// ─── RUM BARREL CHAIN REACTION ─────────────────────────────────────────────
function triggerRumExplosion(rum, safe=false) {
  if (rum.exploding) return;
  rum.exploding=true; rum.explTimer=50;
  const radius=90; let caught=0;
  for (let i=logs.length-1;i>=0;i--) {
    const lg=logs[i], dx=lg.x-rum.x, dy=lg.y-rum.y;
    if (Math.sqrt(dx*dx+dy*dy)<radius) { logs.splice(i,1); caught++; }
  }
  shakeTimer=Math.max(shakeTimer,18);
  sfxExplosion();
  // If a log triggered it (not player), kill player if caught in blast
  if (!safe) {
    const pdx=(P.x+P.w/2)-rum.x, pdy=(P.y+P.h/2)-rum.y;
    if (Math.sqrt(pdx*pdx+pdy*pdy)<radius+10) { die(); return; }
  }
  const pts=caught>0?(200+difficulty*100)*caught:0;
  if (pts>0) {
    score+=pts;
    bonusLabel=(safe?'\ud83d\udca9 +':' BOOM! +')+pts+(caught>1?' \xd7'+caught:'');
    bonusAmt=pts; bonusX=rum.x; bonusY=rum.y-30; bonusTimer=80;
    sfxBonus(); updateHUD();
  }
}

function checkRumBarrels() {
  for (let i=RUMS.length-1;i>=0;i--) {
    const rum=RUMS[i];
    if (rum.exploding) { rum.explTimer--; if (rum.explTimer<=0) RUMS.splice(i,1); continue; }
    for (const lg of logs) {
      if (!lg.rolling) continue;
      const dx=lg.x-rum.x, dy=lg.y-rum.y;
      if (Math.sqrt(dx*dx+dy*dy)<lg.r+14) { triggerRumExplosion(rum,false); break; }
    }
  }
}

// ─── COLLISION ─────────────────────────────────────────────────────────────
function checkCollisions() {
  for (let lg of logs)
    if (overlap(P.x+2,P.y+3,P.w-4,P.h-4, lg.x-lg.r,lg.y-lg.r,lg.r*2,lg.r*2)) { die(); return; }
  for (let f of FIRES)
    if (Math.abs((P.x+P.w/2)-f.x)<18 && Math.abs((P.y+P.h/2)-f.y)<24) { die(); return; }
}

// ─── SCREEN SHAKE ──────────────────────────────────────────────────────────
function updateShake() {
  if (shakeTimer>0) {
    const mag=shakeTimer*0.55;
    shakeX=(Math.random()-0.5)*mag; shakeY=(Math.random()-0.5)*mag; shakeTimer--;
  } else { shakeX=0; shakeY=0; }
}

// ─── DRAW HELPERS ──────────────────────────────────────────────────────────
function drawBamboo(x,y,h) {
  const segH=32, segs=Math.ceil(h/segH);
  for (let i=0;i<segs;i++) {
    const sy=y-i*segH;
    ctx.fillStyle=i%2===0?'#4a7c3f':'#5a9c4f'; ctx.fillRect(x-5,sy-segH,10,segH-2);
    ctx.fillStyle='#3a6030'; ctx.fillRect(x-6,sy-segH,12,4);
    if (i%2===1) {
      ctx.fillStyle='#5ab050';
      ctx.beginPath(); ctx.ellipse(x-22,sy-segH-6,20,6,-0.4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x+22,sy-segH-10,18,5,0.4,0,Math.PI*2); ctx.fill();
    }
  }
}

function drawBackground() {

  [[45,38],[130,22],[210,52],[330,28],[440,18],[580,35],[680,22],[90,75],[270,14],[520,60],[760,30]].forEach(([sx,sy])=>{

function drawPlatforms() {
  PLATS.forEach(([px,pw,y0,y1]) => {
    const grad=ctx.createLinearGradient(0,Math.min(y0,y1),0,Math.max(y0,y1)+PLAT_H);
    grad.addColorStop(0,'#8B4513'); grad.addColorStop(1,'#5c2d0e');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(px,y0); ctx.lineTo(px+pw,y1); ctx.lineTo(px+pw,y1+PLAT_H); ctx.lineTo(px,y0+PLAT_H);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#a0522d88'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(px,y0); ctx.lineTo(px+pw,y1); ctx.stroke();
    ctx.strokeStyle='#5c2d0e66'; ctx.lineWidth=1;
    for (let si=1;si<Math.floor(pw/45);si++) {
      const xi=px+si*45, yi=plY([px,pw,y0,y1],xi);
      ctx.beginPath(); ctx.moveTo(xi,yi); ctx.lineTo(xi,yi+PLAT_H); ctx.stroke();
    }
  });
}

function drawLadders() {
  LADDS.forEach(([lx,ly,lh]) => {
    ctx.lineWidth=3; ctx.strokeStyle='#d4a017';
    ctx.beginPath(); ctx.moveTo(lx-8,ly); ctx.lineTo(lx-8,ly+lh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx+8,ly); ctx.lineTo(lx+8,ly+lh); ctx.stroke();
    ctx.lineWidth=2;
    for (let ry=ly+8;ry<ly+lh;ry+=16) {
      ctx.beginPath(); ctx.moveTo(lx-8,ry); ctx.lineTo(lx+8,ry); ctx.stroke();
    }
  });
}

function drawLogs() {
  logs.forEach(lg => {
    const angle=lg.rot;
    ctx.save(); ctx.translate(lg.x,lg.y); ctx.rotate(angle);
    const col1=lg.type==='fast'?'#cc2200':'#8B4513';

}

function drawBonusFloater() {
  if (bonusTimer>0) {
    ctx.globalAlpha=Math.min(1,bonusTimer/30);
    ctx.fillStyle='#ffd700'; ctx.font='bold 18px Courier New'; ctx.textAlign='center';
    ctx.fillText(bonusLabel||'+'+bonusAmt, bonusX, bonusY-(60-bonusTimer));
    ctx.textAlign='left'; ctx.globalAlpha=1;
    bonusTimer--;
  }
  if (nearMissTimer>0) {
    ctx.globalAlpha=Math.min(1,nearMissTimer/20);
    ctx.fillStyle='#ff9900'; ctx.font='bold 15px Courier New'; ctx.textAlign='center';
    ctx.fillText('CLOSE! +'+nearMissPts, nearMissX, nearMissY-(50-nearMissTimer)*0.4);
    ctx.textAlign='left'; ctx.globalAlpha=1;
    nearMissTimer--;
  }
}

function drawFires() {
  const t=frame*0.09;
  FIRES.forEach(f => {
    const fx=f.x, fy=f.y-2;
    const layers=[['#ff2200',20,6],['#ff7700',14,4],['#ffcc00',8,3]];
    layers.forEach(([hue,fh,fw],fl) => {
      const flicker=Math.sin(t+f.w+fl*1.4)*3;
      ctx.globalAlpha=0.75+fl*0.08;
      ctx.fillStyle=hue;
      ctx.beginPath();
      ctx.moveTo(fx+flicker, fy-fh);
      ctx.quadraticCurveTo(fx+fw+flicker, fy-fh*0.55, fx+fw*0.5, fy);
      ctx.quadraticCurveTo(fx-fw*0.5, fy, fx-fw+flicker, fy-fh*0.55);
      ctx.closePath(); ctx.fill();
    });
    ctx.globalAlpha=1;
    const gr=ctx.createRadialGradient(fx,fy,0,fx,fy,22);
    gr.addColorStop(0,'rgba(255,120,0,0.28)'); gr.addColorStop(1,'rgba(255,60,0,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(fx,fy,22,0,Math.PI*2); ctx.fill();
    f.w+=0.04; // slow rotation of flicker phase
  });
}

function drawRums() {
  RUMS.forEach(rum => {
    if (rum.exploding) {
      const prog=1-rum.explTimer/50, alpha=Math.max(0,1-prog*1.3);
      ctx.globalAlpha=alpha;
      ctx.strokeStyle='#ffaa00'; ctx.lineWidth=6*(1-prog)+1;
      ctx.beginPath(); ctx.arc(rum.x,rum.y,prog*90,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='#ff4400'; ctx.lineWidth=3*(1-prog)+1;
      ctx.beginPath(); ctx.arc(rum.x,rum.y,prog*54,0,Math.PI*2); ctx.stroke();
      if (prog<0.3) {
        ctx.globalAlpha=(0.3-prog)/0.3*0.85;
        ctx.fillStyle='#fff8c0';
        ctx.beginPath(); ctx.arc(rum.x,rum.y,22*(1-prog/0.3),0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1; ctx.lineWidth=1;
    } else {
      ctx.save(); ctx.translate(rum.x,rum.y);
      // barrel body
      ctx.fillStyle='#b88010'; ctx.beginPath(); ctx.ellipse(0,0,11,14,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#e0a820'; ctx.fillRect(-10,-6,20,12);
      ctx.fillStyle='#b88010';
      ctx.beginPath(); ctx.ellipse(0,-8,10,6,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(0,8,10,6,0,0,Math.PI*2); ctx.fill();
      // hoops
      ctx.strokeStyle='#999'; ctx.lineWidth=2;
      [-5,0,5].forEach(hy=>{ctx.beginPath();ctx.ellipse(0,hy,11,4,0,0,Math.PI*2);ctx.stroke();});
      // label
      ctx.fillStyle='#fff'; ctx.font='bold 7px Courier New'; ctx.textAlign='center';
      ctx.fillText('RUM',0,3); ctx.textAlign='left';
      // glow
      const gr=ctx.createRadialGradient(0,0,0,0,0,22);
      gr.addColorStop(0,'rgba(255,190,0,0.22)'); gr.addColorStop(1,'rgba(255,120,0,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  });
}

// ─── NAME ENTRY (classic arcade 3-letter) ──────────────────────────────────
function drawNameEntry() {
  ctx.fillStyle='rgba(0,0,0,0.88)'; ctx.fillRect(0,0,W,H);
  const px=160, py=145, pw=480, ph=390;
  ctx.fillStyle='#08080f'; ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle='#ff6b35'; ctx.lineWidth=3; ctx.strokeRect(px,py,pw,ph);

  ctx.textAlign='center';
  ctx.fillStyle='#ff3333'; ctx.font='bold 40px Courier New';
  ctx.fillText('GAME  OVER', W/2, py+52);
  ctx.fillStyle='#ffd700'; ctx.font='bold 19px Courier New';
  ctx.fillText('SCORE: '+score.toLocaleString(), W/2, py+88);
  ctx.fillStyle='#ff6b35'; ctx.font='bold 16px Courier New';
  ctx.fillText('★  TOP 10 SCORE!  ★', W/2, py+118);
  ctx.fillStyle='#aef'; ctx.font='15px Courier New';
  ctx.fillText('ENTER YOUR NAME', W/2, py+150);

  // Three letter slots
  const slotW=58, slotH=68, gap=88, startX=W/2-gap;
  for (let i=0; i<3; i++) {
    const sx=startX+i*gap-slotW/2, sy=py+168, active=i===namePos;
    ctx.fillStyle=active?'#111830':'#0a0a18'; ctx.fillRect(sx,sy,slotW,slotH);
    ctx.strokeStyle=active?'#ffd700':'#334'; ctx.lineWidth=active?3:1;
    ctx.strokeRect(sx,sy,slotW,slotH);
    ctx.fillStyle=active?'#ffd700':'#888'; ctx.font='bold 46px Courier New';
    ctx.fillText(nameLetters[i], startX+i*gap, sy+52);
    if (active && Math.floor(nameBlink/15)%2===0) {
      ctx.fillStyle='#ffd700'; ctx.fillRect(sx+8,sy+slotH-7,slotW-16,4);
    }
  }
  nameBlink++;

  ctx.fillStyle='#ffd700'; ctx.font='bold 14px Courier New';
  ctx.fillText('TYPE your initials  — or use  ↑ ↓', W/2, py+272);
  ctx.fillStyle='#556'; ctx.font='13px Courier New';
  ctx.fillText('← →  Move     BKSP  Delete     ENTER  Confirm', W/2, py+293);
  ctx.textAlign='left';
}

// ─── GAME OVER / LEADERBOARD ───────────────────────────────────────────────
function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.90)'; ctx.fillRect(0,0,W,H);
  const px=100, py=45, pw=600, ph=600;
  ctx.fillStyle='#08080f'; ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle='#ff6b35'; ctx.lineWidth=3; ctx.strokeRect(px,py,pw,ph);

  ctx.textAlign='center';
  ctx.fillStyle='#ffd700'; ctx.font='bold 32px Courier New';
  ctx.fillText('HIGH  SCORES', W/2, py+44);
  ctx.strokeStyle='#333'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(px+20,py+55); ctx.lineTo(px+pw-20,py+55); ctx.stroke();

  // Column headers
  ctx.fillStyle='#445'; ctx.font='12px Courier New';
  ctx.fillText('RANK       NAME       SCORE', W/2, py+74);

  for (let i=0; i<Math.min(scores.length,10); i++) {
    const e=scores[i], y=py+100+i*48, isMe=e===justAdded;
    if (isMe) { ctx.fillStyle='rgba(255,215,0,0.12)'; ctx.fillRect(px+16,y-26,pw-32,40); }
    const col = isMe?'#ffd700': i===0?'#ffd700': i===1?'#c0c0c0': i===2?'#cd7f32':'#aaa';
    ctx.fillStyle=col;
    ctx.font=(isMe?'bold ':'')+'17px Courier New';
    const rank=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'][i]||`${i+1}.`;
    ctx.fillText(`${rank}   ${e.name}   ${e.score.toLocaleString()}`, W/2, y);
  }
  if (!scores.length) {
    ctx.fillStyle='#445'; ctx.font='15px Courier New'; ctx.fillText('No scores yet', W/2, py+140);
  }

  ctx.fillStyle='#ff6b35'; ctx.font='bold 17px Courier New';
  ctx.fillText('PRESS SPACE TO PLAY AGAIN', W/2, py+ph-22);
  ctx.textAlign='left';
}

// ─── MAIN DRAW ─────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.translate(shakeX,shakeY);

  drawBackground(); drawPlatforms(); drawLadders();

  const TOP=PLATS[5], babyX=TOP[0]+TOP[1]-80, babyY=plY(TOP,babyX);
  drawBabyPanda(babyX+15, babyY-24);
  drawPirate(TOP[0]+55, plY(TOP,TOP[0]+55)-2);

  drawFires();
  drawRums();
  drawLogs();
  drawPoo();
  if (state!=='title') drawPanda();
  drawBonusFloater();

  if (state==='dead')
    drawUI_overlay('OOF!', 'Lives left: '+lives);
  if (state==='win')
    drawUI_overlay('RESCUED!','Baby panda saved! +'+(2000+difficulty*500)+' pts');

  ctx.restore();
}

// ─── GAME LOOP ─────────────────────────────────────────────────────────────
function loop() {
  frame++; updateShake();

  if (state==='title') {
    drawTitle();
    if (KP['Space']||KP['Enter']) { state='playing'; reset(); startMusic(); }
    clearKP(); requestAnimationFrame(loop); return;
  }
  if (state==='dead') {
    deathTimer--; updateLogs(); draw();
    if (deathTimer<=0 && (KP['Space']||KP['Enter'])) { reset(); state='playing'; startMusic(); }
    clearKP(); requestAnimationFrame(loop); return;
  }
  if (state==='namentry') {
    draw(); drawNameEntry();
    const ALPHA='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    // Direct typing — set letter and auto-advance
    if (typedKey) {
      nameLetters[namePos]=typedKey;
      if (namePos<2) { namePos++; sfxBlip(); }
      else endNameEntry(nameLetters.join(''));
    } else {
      // Arrow cycling (classic arcade / joystick fallback)
      if (KP['ArrowUp'])   { nameLetters[namePos]=ALPHA[(ALPHA.indexOf(nameLetters[namePos])+1)%26]; sfxBlip(); }
      if (KP['ArrowDown']) { nameLetters[namePos]=ALPHA[(ALPHA.indexOf(nameLetters[namePos])+25)%26]; sfxBlip(); }
      if (KP['ArrowLeft']  && namePos>0) { namePos--; sfxBlip(); }
      if (KP['ArrowRight'] && namePos<2) { namePos++; sfxBlip(); }
      if (KP['Backspace']  && namePos>0) { namePos--; nameLetters[namePos]='A'; sfxBlip(); }
      if (KP['Enter'] || KP['Space']) {
        if (namePos<2) { namePos++; sfxBlip(); }
        else endNameEntry(nameLetters.join(''));
      }
    }
    clearKP(); requestAnimationFrame(loop); return;
  }
  if (state==='gameover') {
    draw(); drawGameOver();
    if (KP['Space']||KP['Enter']) init();
    clearKP(); requestAnimationFrame(loop); return;
  }
  if (state==='win') {
    draw();
    if (KP['Space']||KP['Enter']) {
      difficulty++; gameLevel++; updateHUD(); LADDS = generateLadders(); reset(); state='playing'; startMusic();
    }
    clearKP(); requestAnimationFrame(loop); return;
  }

  updatePlayer();
  if (state==='playing') { updateLogs(); checkRumBarrels(); updatePoo(); checkJumpBonus(); checkNearMiss(); checkCollisions(); }
  draw(); clearKP();
  requestAnimationFrame(loop);
}

init(); loop();
